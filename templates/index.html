<!DOCTYPE html>
<html>
<head>
    <title>Sentiment Analyzer</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f4f4;
            padding-top: 100px;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            margin: auto;
            box-shadow: 0px 0px 10px gray;
        }
        input {
            width: 80%;
            padding: 10px;
            margin: 10px;
        }
        button {
            padding: 10px 20px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }
        h2 {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>Sentiment Analysis</h1>

    <form action="/predict_web" method="post">
        <input type="text" name="text" placeholder="Enter your sentence" required>
        <br>
        <button type="submit">Analyze</button>
    </form>

    <h2>{{ result }}</h2>
</div>

</body>
</html>
